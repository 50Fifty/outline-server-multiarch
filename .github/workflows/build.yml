name: Build

permissions:
  contents: read

env:
  UPSTREAM_REPOSITORY: "Jigsaw-Code/outline-server"
  PACKAGE_NAME: "ghcr.io/${{ github.repository_owner }}/shadowbox"
  ARCH: "linux/amd64,linux/arm64"

on:
  push:
  schedule:
    - cron: "0 0 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Run helper tests
        run: |
          bash -n build.sh
          bash -n tests/build_sh_helpers_test.sh
          bash -n tests/extract_tar_member_fixture_test.sh
          bash tests/build_sh_helpers_test.sh
          bash tests/extract_tar_member_fixture_test.sh

  version:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      local_tag: ${{steps.local.outputs.tag}}
      remote_tag: ${{steps.remote.outputs.tag}}
      is_latest_build_required: ${{steps.test.outputs.latest}}
    steps:
      - name: Get remote version
        id: remote
        run: |
          curl_args=(-fsSL)
          if [[ -n "${GITHUB_TOKEN:-}" ]]; then
            curl_args+=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
          fi
          tag="$(curl "${curl_args[@]}" "https://api.github.com/repos/${{env.UPSTREAM_REPOSITORY}}/releases/latest" | jq -r '.tag_name')"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Get local release
        id: local
        run: |
          curl_args=(-fsSL)
          if [[ -n "${GITHUB_TOKEN:-}" ]]; then
            curl_args+=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
          fi
          tag="$(curl "${curl_args[@]}" "https://api.github.com/repos/${{github.repository}}/releases" | jq -r '[.[] | select(.name | startswith("latest-"))] | sort_by(.published_at)[-1].name // ""')"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Test
        id: test
        run: |
          if [[ "latest-${{steps.remote.outputs.tag}}" != "${{steps.local.outputs.tag}}" ]];
          then
            echo "latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi
  build_master:
    needs: [test, version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.3"
          cache: false
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.repository_owner}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and push
        run: |
          bash ./build.sh "${{env.ARCH}}" "${{env.PACKAGE_NAME}}:master" "master"
  build_latest:
    needs: [test, version]
    runs-on: ubuntu-latest
    if: needs.version.outputs.is_latest_build_required == 'true'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/setup-go@v6
        with:
          go-version: ">=1.26.3"
          # build.sh clones upstream into a temp directory, so there is no stable
          # in-repo go.sum for setup-go to hash before the build starts.
          cache: false
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.repository_owner}}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Build and push
        run: |
          bash ./build.sh "${{env.ARCH}}" "${{env.PACKAGE_NAME}}:latest" "${{needs.version.outputs.remote_tag}}"
      - name: Conditional release
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          gh release create "latest-${{needs.version.outputs.remote_tag}}" \
            --title "latest-${{needs.version.outputs.remote_tag}}" \
            --notes "This release is for identification use of CI script. Please, read README to deploy this package."
